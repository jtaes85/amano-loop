name: Build EXE on Windows
on: [push] # 코드를 올릴 때마다 자동 빌드

jobs:
  build:
    runs-on: windows-latest # 윈도우 환경 빌드 서버 대여
    steps:
      - uses: actions/checkout@v4
      - name: Python 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' # 사용 중인 버전으로 수정 가능
      - name: 패키지 설치 및 빌드
        run: |
          pip install pyinstaller
          # 필요한 라이브러리가 있다면 여기에 추가 (예: pip install selenium)
          pyinstaller --onefile main.py
      - name: 결과물 업로드
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/*.exe
